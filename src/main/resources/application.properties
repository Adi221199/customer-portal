spring.application.name=customer-portal

# Server
server.port=8080

# DB
spring.datasource.url=jdbc:postgresql://localhost:5432/customer_portal
spring.datasource.username=postgres
spring.datasource.password=Password

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT (HS256 — use at least 32 bytes; override in env for real deployments)
jwt.secret=dev-customer-portal-jwt-secret-key-min-32b!!
jwt.expiration-seconds=3600

