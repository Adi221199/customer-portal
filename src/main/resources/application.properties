spring.application.name=customer-portal

# CORS: browser Origin when FE is http://10.x.x.x:5173 and API is :8080 (comma-separated Ant-style origin patterns)
customer-portal.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,http://10.*.*.*:*,http://192.168.*.*:*,http://172.*.*.*:*,https://*.ngrok-free.dev,https://*.ngrok-free.app,http://*.ngrok-free.dev,https://*.ngrok.io,http://*.ngrok.io


# Server
server.address=0.0.0.0
server.port=8080

# DB
spring.datasource.url=jdbc:postgresql://localhost:5432/customer_portal_2
spring.datasource.username=postgres
spring.datasource.password=Password

# JPA
spring.jpa.hibernate.ddl-auto=update
# Map Criteria year()/month() to extract() — required for PostgreSQL (see CustomerPortalPostgresDialect)
spring.jpa.properties.hibernate.dialect=com.scai.customer_portal.config.CustomerPortalPostgresDialect
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

# JWT (HS256 — use at least 32 bytes; override in env for real deployments)
jwt.secret=dev-customer-portal-jwt-secret-key-min-32b!!
jwt.expiration-seconds=172800

# --- Jira (server-side integration; NOT per portal user login) ---
# REST base for key-only import: POST body uses jiraKey: "EDM-3617" only.
jira.base-url=https://3scsolution.atlassian.net
# Atlassian account that owns the API token (same email you use on id.atlassian.com).
jira.email=aditya.narendra@3scsolution.com
# NEVER commit API tokens. Use: set JIRA_API_TOKEN=... (PowerShell / IDE env)
jira.api-token=ATATT3xFfGF0RCRworpGjyBHY5RgxbgEOeEmesj3Zh12-2LAfrwJVNTe1I7aPpG0bty2SIsRTmBUYuSb9aLJ78hJ60bjhKoLgW_pOSrwaZQywyYmsMFZzs8bLtb-MUEKLKls5RakSQfm_Jcww9IeCC1_KBhMfbnNjRQRhoox9y767MoUJd49xZk=B8D2CF23
# Customer field on issues is auto-detected (Jira field named "Customer") — no customfield id in properties.
# Optional custom fields (ID vary per site — from Jira Settings → Issues → Custom fields → … → … in API)
jira.module-field-id=
# Optional override; if empty, "Env" or "Environment" field is auto-detected like Customer
jira.environment-field-id=
jira.category-field-id=
# Optional: RCA / root-cause custom field (plain text or rich text)
jira.rca-field-id=
# Optional: periodically re-fetch all Jira-linked issues (requires jira.* credentials). Default off.
jira.background-sync-enabled=true
# Spring cron (second minute hour day month weekday). Every 15 minutes — tighten for production, e.g. 0 0 */4 * * *
jira.background-sync-cron=0 */15 * * * *
# Bulk import (POST /api/issues/import-jira-bulk): JQL requires non-empty Customer + Environment fields.
# Optional AND fragment, e.g. project in (EDM, DPAI, DevOps)
jira.bulk-import-extra-jql=
# Omit, set 0, or use a negative value = import every matching issue (JQL paginates until Jira has no more).
# Set a positive integer only if you need an explicit cap (e.g. jira.bulk-import-max-total=50000).

# Actuator
management.endpoints.web.exposure.include=health,info

